name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: C:\A\mgkh-local-agent
    steps:
      - name: Pull latest code
        run: git pull origin main

      - name: Install dependencies
        run: venv\Scripts\pip install -r requirements.txt
        shell: cmd

      - name: Install Playwright browsers
        run: |
          set PLAYWRIGHT_BROWSERS_PATH=C:\A\playwright
          venv\Scripts\playwright install chromium
        shell: cmd

      - name: Restart agent task
        run: |
          schtasks /end /tn "mgkh-local-agent"
          Start-Sleep -Seconds 2
          schtasks /run /tn "mgkh-local-agent"
        shell: powershell
